<!DOCTYPE html><html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Portfolio Tracker — Brandon Knight</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <header class="site-header"><a href="index.html">← Back</a><div class="header-title"><h1>Brandon Knight</h1><p>Portfolio Tracker</p></div><button class="cog-btn" data-action="toggle-settings" aria-label="Settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a6.97 6.97 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.47.47 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button></header>
  <div class="settings-overlay" id="settingsOverlay"><div class="settings-backdrop" data-action="close-settings"></div>
    <div class="settings-panel"><div class="settings-panel-header"><span>Settings</span></div>
      <div class="settings-row"><label for="themeToggle" class="settings-label">Light Mode</label><label class="toggle"><input type="checkbox" id="themeToggle"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>
      <div class="settings-row col"><label for="finnhubKey" class="settings-label">Finnhub key</label><input id="finnhubKey" class="settings-input" type="password" autocomplete="off" placeholder="Required — finnhub.io free tier"><span class="settings-hint">Stored locally in your browser. Never committed.</span></div>
      <div class="settings-row"><span class="settings-label">Export data</span><button class="btn-small" data-action="export">Download</button></div>
      <div class="settings-row"><span class="settings-label">Import data</span><label for="importFile" class="btn-small" style="cursor: pointer; display: inline-block;">Upload</label><input type="file" id="importFile" accept=".json" hidden></div>
    </div></div>
  <main class="main"><div class="main-layout">
    <div class="main-left">
      <div class="toolbar"><button class="refresh-btn" id="refreshBtn" data-action="refresh">↻ Refresh prices</button><span class="last-updated" id="lastUpdated"></span></div>
      <div class="summary-grid">
        <div class="metric"><div class="metric-label">Total value</div><div class="metric-value" id="totalVal">—</div></div><div class="metric"><div class="metric-label">Day gain/loss</div><div class="metric-value" id="dayGain">—</div></div>
        <div class="metric"><div class="metric-label">Accounts</div><div class="metric-value" id="acctCount">0</div></div><div class="metric"><div class="metric-label">Positions</div><div class="metric-value" id="posCount">0</div></div>
      </div>
      <div class="accounts" id="accountsList"></div><button class="add-account-btn" data-action="add-account">+ Add Account</button>
    </div>
    <div class="main-right"><div class="chart-panel">
      <div class="chart-panel-header"><span class="chart-panel-title">Performance</span></div><div class="chart-legend" id="chartLegend"></div>
      <div class="chart-canvas-wrap" id="chartCanvasWrap"><canvas id="mainChart"></canvas><div class="chart-tooltip" id="chartTooltip"></div></div>
      <div class="chart-empty" id="chartEmpty">No history yet.<br>Snapshots save daily<br>on price refresh.</div>
    </div></div>
  </div></main>
  <div class="modal-bg" id="stockModal"><div class="modal"><h3>Add Holding</h3><label for="mTicker">Ticker / Company name</label><div class="ticker-wrap"><input id="mTicker" placeholder="Search: Apple, AAPL…" autocomplete="off" style="text-transform: uppercase;"><div class="ticker-dropdown" id="tickerDropdown"></div></div><label for="mShares">Shares</label><input id="mShares" type="number" placeholder="10" min="0.0001" step="any"><label for="mDate">Date purchased</label><input id="mDate" type="date"><label for="mCost">Avg buy price per share (optional)</label><input id="mCost" type="number" placeholder="150.00" min="0" step="any"><div class="error-msg" id="modalError"></div><div class="modal-btns"><button class="cancel" data-action="close-modal">Cancel</button><button class="save" data-action="save-holding">Add</button></div></div></div>
  <div class="modal-bg" id="accountModal"><div class="modal"><h3>Add Account</h3><label for="aName">Account name</label><input id="aName" placeholder="Roth IRA, Fidelity..."><div class="error-msg" id="accountError"></div><div class="modal-btns"><button class="cancel" data-action="close-account-modal">Cancel</button><button class="save" data-action="save-account">Create</button></div></div></div>
  <script src="app.js" defer></script>
</body></html>
